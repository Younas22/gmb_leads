<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CustomerNearMe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      width: 420px;
      background: #f8f9fa;
      color: #333;
    }

    .header {
      background: #ffffff;
      border-bottom: 2px solid #f97316;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-logo { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #f97316; }
    .header .mode-badge {
      margin-left: auto;
      font-size: 10px;
      background: #fff7ed;
      color: #f97316;
      border: 1px solid #fed7aa;
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ===== LOGIN VIEW ===== */
    #view-login { padding: 20px 16px; }
    .login-box {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 24px 20px;
      text-align: center;
    }
    .login-icon { font-size: 36px; margin-bottom: 10px; }
    .login-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .login-sub { font-size: 12px; color: #888; margin-top: 4px; margin-bottom: 18px; }
    .login-input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
      display: block;
    }
    .login-input:focus { border-color: #f97316; }
    .login-btn {
      width: 100%;
      padding: 10px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-btn:hover { background: #ea6c00; }
    .login-btn:disabled { background: #fdba74; cursor: not-allowed; }
    #login-status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 16px;
      text-align: left;
    }
    .login-error   { color: #d93025; }
    .login-info    { color: #666; }
    .login-success { color: #188038; }

    /* ===== USER BAR ===== */
    #user-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: #fff7ed;
      border-bottom: 1px solid #fed7aa;
      font-size: 11px;
    }
    #user-info {
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 1;
      min-width: 0;
    }
    #user-name-text {
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }
    #user-package-badge {
      font-size: 9px;
      background: #f97316;
      color: white;
      padding: 1px 7px;
      border-radius: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #credits-info {
      color: #333;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 500;
    }
    #btn-logout {
      background: none;
      border: 1px solid #fed7aa;
      border-radius: 4px;
      color: #f97316;
      font-size: 10px;
      padding: 2px 8px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #btn-logout:hover { background: #ffedd5; }

    /* ===== MAIN CONTENT ===== */
    .content { padding: 12px 14px; }

    #btn-scrape {
      width: 100%;
      padding: 10px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #btn-scrape:hover { background: #ea6c00; }
    #btn-scrape:disabled { background: #fdba74; cursor: not-allowed; }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 16px;
    }
    #status.error { color: #d93025; }
    #status.success { color: #188038; }

    /* ===== PROGRESS BAR ===== */
    #progress-wrap {
      display: none;
      margin-top: 8px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px 12px;
    }
    #progress-wrap.visible { display: block; }
    #progress-label {
      font-size: 11px;
      color: #555;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }
    #progress-track {
      background: #e8eaed;
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    #progress-bar {
      background: #f97316;
      height: 5px;
      width: 0%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    #progress-phase {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
      text-align: center;
    }

    /* ===== SINGLE BUSINESS VIEW ===== */
    #view-single { display: none; margin-top: 10px; }
    #view-single.visible { display: block; }

    .result-box {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      max-height: 420px;
      overflow-y: auto;
    }
    .result-box::-webkit-scrollbar { width: 5px; }
    .result-box::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 3px; }

    .field {
      padding: 9px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .field:last-child { border-bottom: none; }
    .field-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; }
    .field-body { flex: 1; min-width: 0; }
    .field-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #888;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .field-value { font-size: 12px; color: #222; word-break: break-word; }
    .field-value.empty { color: #aaa; font-style: italic; }
    .field-value a { color: #f97316; text-decoration: none; }
    .field-value a:hover { text-decoration: underline; }
    .field-copy {
      background: none; border: none; cursor: pointer;
      padding: 2px 5px; border-radius: 4px; font-size: 11px; color: #888; flex-shrink: 0;
    }
    .field-copy:hover { background: #f0f0f0; }
    .field-copy.copied { color: #188038; }

    /* Opening hours list */
    .hours-list { list-style: none; }
    .hours-list li { font-size: 11px; line-height: 1.8; color: #333; }

    /* Chip tags */
    .chip-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .chip {
      display: inline-block;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      padding: 2px 9px;
      font-size: 10px;
      color: #f97316;
      word-break: break-all;
    }
    .chip.social { background: #f3e8fd; border-color: #d7b8f7; color: #6200ea; }
    .chip.social a { color: #6200ea; text-decoration: none; }
    .chip.social a:hover { text-decoration: underline; }

    /* Fetch status indicator */
    .fetch-badge {
      font-size: 10px;
      font-weight: normal;
      text-transform: none;
      letter-spacing: 0;
      padding: 1px 6px;
      border-radius: 8px;
      background: #fff3cd;
      color: #856404;
    }
    .fetch-badge.done { background: #d4edda; color: #155724; }
    .fetch-badge.error { background: #f8d7da; color: #721c24; }

    /* Reviews */
    .review-list { display: flex; flex-direction: column; gap: 6px; }
    .review-item {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 7px 9px;
    }
    .review-header { display: flex; justify-content: space-between; align-items: center; }
    .review-author { font-size: 11px; font-weight: 600; color: #222; }
    .review-stars { color: #f97316; font-size: 10px; letter-spacing: 1px; }
    .review-time { font-size: 10px; color: #999; margin-top: 1px; }
    .review-text { font-size: 11px; color: #444; margin-top: 4px; line-height: 1.5; }

    /* ===== BULK RESULTS VIEW ===== */
    #view-bulk { display: none; margin-top: 10px; }
    #view-bulk.visible { display: block; }

    .bulk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .bulk-count { font-size: 13px; font-weight: 600; color: #333; }
    .btn-export {
      padding: 5px 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 5px;
      font-size: 12px;
      color: #f97316;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-export:hover { background: #ffedd5; }

    #bulk-list {
      max-height: 350px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #bulk-list::-webkit-scrollbar { width: 5px; }
    #bulk-list::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 3px; }

    .biz-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 7px;
      padding: 9px 11px;
    }
    .biz-name {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .biz-name a { color: #f97316; text-decoration: none; }
    .biz-name a:hover { text-decoration: underline; }
    .biz-detail {
      font-size: 11px;
      color: #555;
      display: flex;
      gap: 5px;
      align-items: flex-start;
      margin-top: 3px;
    }
    .biz-detail .di { flex-shrink: 0; }
    .biz-detail .dt { word-break: break-word; }
    .biz-detail .dt.empty { color: #bbb; font-style: italic; }
    .biz-rating {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      color: #f97316;
      font-weight: 600;
    }
    .biz-section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      margin-top: 6px;
      margin-bottom: 2px;
    }
    .biz-chip-list { display: flex; flex-wrap: wrap; gap: 3px; }
    .biz-chip {
      font-size: 10px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 10px;
      padding: 1px 7px;
      color: #f97316;
      word-break: break-all;
    }
    .biz-chip.social { background: #f3e8fd; border-color: #d7b8f7; color: #6200ea; }
    .biz-chip a { color: inherit; text-decoration: none; }
    .biz-review { font-size: 10px; color: #444; line-height: 1.4; margin-top: 3px; padding: 4px 6px; background: #f8f9fa; border-radius: 4px; }
    .biz-review-meta { color: #888; margin-bottom: 2px; }
    .biz-hours-list { list-style: none; }
    .biz-hours-list li { font-size: 10px; color: #555; line-height: 1.7; }

    /* ===== SHARED ACTIONS ===== */
    .actions {
      padding: 8px 12px;
      border-top: 1px solid #e8e8e8;
      background: #fafafa;
      display: flex;
      gap: 6px;
    }
    .btn-small {
      flex: 1; padding: 6px 8px;
      border: 1px solid #dadce0; background: white;
      border-radius: 5px; font-size: 11px; cursor: pointer; font-weight: 500;
    }
    .btn-small:hover { background: #f1f3f4; }
    .btn-small.primary { background: #fff7ed; border-color: #fed7aa; color: #f97316; }
    .btn-small.primary:hover { background: #ffedd5; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="icons/icon48.png" class="header-logo" alt="logo">
    <h1>CustomerNearMe</h1>
    <span class="mode-badge" id="mode-badge">-</span>
  </div>

  <!-- ===== LOGIN VIEW ===== -->
  <div id="view-login">
    <div class="login-box" style="margin:16px;">
      <div class="login-icon">🔐</div>
      <div class="login-title">CustomerNearMe Login</div>
      <div class="login-sub">Sign in to your account</div>
      <input type="email"    id="input-email"    class="login-input" placeholder="Email address">
      <input type="password" id="input-password" class="login-input" placeholder="Password">
      <button id="btn-login" class="login-btn">Login</button>
      <div id="login-status"></div>
    </div>
  </div>

  <!-- ===== APP VIEW (shown after login) ===== -->
  <div id="view-app" style="display:none">

    <!-- User info bar -->
    <div id="user-bar">
      <div id="user-info">
        <span id="user-name-text"></span>
        <span id="user-package-badge"></span>
      </div>
      <span id="credits-info"></span>
      <button id="btn-logout">Logout</button>
    </div>

    <div class="content">
      <button id="btn-scrape">Scrape Business Details</button>
      <div id="status">Open a Google Maps business or search page</div>

      <!-- PROGRESS BAR (bulk deep scrape) -->
      <div id="progress-wrap">
        <div id="progress-label">
          <span id="progress-text">Starting...</span>
          <span id="progress-count">0/0</span>
        </div>
        <div id="progress-track"><div id="progress-bar"></div></div>
        <div id="progress-phase"></div>
      </div>

      <!-- SINGLE BUSINESS VIEW -->
      <div id="view-single">
        <div class="result-box">

          <!-- Name -->
          <div class="field">
            <span class="field-icon">🏢</span>
            <div class="field-body">
              <div class="field-label">Business Name</div>
              <div class="field-value" id="val-name">-</div>
            </div>
            <button class="field-copy" data-field="name">📋</button>
          </div>

          <!-- Phone -->
          <div class="field">
            <span class="field-icon">📞</span>
            <div class="field-body">
              <div class="field-label">Phone</div>
              <div class="field-value" id="val-phone">-</div>
            </div>
            <button class="field-copy" data-field="phone">📋</button>
          </div>

          <!-- Address -->
          <div class="field">
            <span class="field-icon">📌</span>
            <div class="field-body">
              <div class="field-label">Address</div>
              <div class="field-value" id="val-address">-</div>
            </div>
            <button class="field-copy" data-field="address">📋</button>
          </div>

          <!-- Website -->
          <div class="field">
            <span class="field-icon">🌐</span>
            <div class="field-body">
              <div class="field-label">Website</div>
              <div class="field-value" id="val-website">-</div>
            </div>
            <button class="field-copy" data-field="website">📋</button>
          </div>

          <!-- Rating & Reviews count -->
          <div class="field">
            <span class="field-icon">⭐</span>
            <div class="field-body">
              <div class="field-label">Rating &amp; Reviews</div>
              <div class="field-value" id="val-rating">-</div>
            </div>
          </div>

          <!-- Opening Hours -->
          <div class="field">
            <span class="field-icon">🕐</span>
            <div class="field-body">
              <div class="field-label">Opening Hours</div>
              <div class="field-value" id="val-hours">-</div>
            </div>
          </div>

          <!-- Emails -->
          <div class="field">
            <span class="field-icon">📧</span>
            <div class="field-body">
              <div class="field-label">
                Emails
                <span class="fetch-badge" id="email-fetch-status" style="display:none"></span>
              </div>
              <div class="field-value" id="val-emails">-</div>
            </div>
          </div>

          <!-- Social Links -->
          <div class="field">
            <span class="field-icon">🔗</span>
            <div class="field-body">
              <div class="field-label">
                Social Links
                <span class="fetch-badge" id="social-fetch-status" style="display:none"></span>
              </div>
              <div class="field-value" id="val-socials">-</div>
            </div>
          </div>

          <!-- Reviews -->
          <div class="field">
            <span class="field-icon">💬</span>
            <div class="field-body">
              <div class="field-label">Reviews</div>
              <div class="field-value" id="val-reviews">-</div>
            </div>
          </div>

          <!-- Actions -->
          <div class="actions">
            <button class="btn-small primary" id="btn-copy-all">Copy All</button>
            <button class="btn-small" id="btn-csv-single">Export CSV</button>
          </div>
        </div>
      </div>

      <!-- BULK RESULTS VIEW -->
      <div id="view-bulk">
        <div class="bulk-header">
          <span class="bulk-count" id="bulk-count">0 businesses found</span>
          <button class="btn-export" id="btn-csv-bulk">Export CSV</button>
          <button class="btn-export" id="btn-clear-bulk" title="Clear all scraped data and start fresh" style="background:#fff3f3;color:#d32f2f;border-color:#f5c6c6;">Clear</button>
        </div>
        <div id="bulk-list"></div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
